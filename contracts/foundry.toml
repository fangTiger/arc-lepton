[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
cache_path = "cache"
broadcast = "broadcast"
libs = ["lib"]

solc = "0.8.30"
auto_detect_solc = false
evm_version = "prague"
optimizer = true
optimizer_runs = 200
via_ir = false

auto_detect_remappings = false
bytecode_hash = "ipfs"
cbor_metadata = true
use_literal_content = false
build_info = true
build_info_path = "out/build-info"
extra_output = ["metadata"]
